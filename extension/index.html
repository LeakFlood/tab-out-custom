<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Out</title>

  <!-- Google Fonts: Newsreader (for headings/numbers) + DM Sans (for body text) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <button type="button" id="languageToggleBtn" class="language-toggle-btn">
    FR
  </button>

  <div class="backup-menu-wrap" id="backupMenuWrap">
    <button type="button" id="backupMenuBtn" class="backup-menu-btn" data-action="toggle-backup-menu" data-i18n-title="backupMenuTitle" aria-haspopup="true" aria-expanded="false">
      ⋯
    </button>

    <div class="backup-menu" id="backupMenu" hidden>
      <button type="button" data-action="export-tab-out-data" data-i18n="exportData">Exporter les données</button>
      <button type="button" data-action="import-tab-out-data" data-i18n="importData">Importer les données</button>
    </div>

    <input type="file" id="backupImportInput" accept="application/json,.json" hidden>
  </div>

<div id="sessionModal" class="session-modal" hidden>
  <div class="session-modal-card">
    <div class="session-modal-header">
      <div>
        <h2 id="sessionModalTitle" data-i18n="createSessionTitle">Créer une session</h2>
        <p data-i18n="sessionTabsRequired">Sélectionne les onglets à inclure.</p>
      </div>
    </div>

    <label class="session-name-label">
      <span data-i18n="sessionNameLabel">Nom de la session</span>
      <input type="text" id="sessionNameInput" placeholder="Ex : Dev Ultra" data-i18n-placeholder="sessionNamePlaceholder">
    </label>

    <div class="session-tabs-toolbar">
      <button type="button" id="selectAllSessionTabsBtn" data-i18n="selectAll">Tout sélectionner</button>
      <button type="button" id="clearSessionTabsBtn" data-i18n="clearAll">Tout décocher</button>
    </div>

    <div class="session-tabs-list" id="sessionTabsList"></div>

    <div class="session-modal-actions">
      <button type="button" id="deleteSessionBtn" data-i18n="delete" hidden>Supprimer</button>
      <button type="button" id="cancelSessionBtn" data-i18n="cancel">Annuler</button>
      <button type="button" id="saveSessionBtn" data-i18n="save">Sauvegarder</button>
    </div>
  </div>
</div>


  <div class="container">

  <!-- ================================================================
       HEADER — greeting on the left, shortcuts on the right
       ================================================================ -->
       <header>
        <div class="header-left">
          <div class="hero-text">
            <h1 id="greeting"></h1>
            <div id="timeDisplay"></div>
            <div id="dateDisplay"></div>
            <div class="weather-widget" id="weatherWidget" hidden>
              <button type="button" class="weather-enable-btn" id="weatherEnableBtn" data-i18n="weatherEnable">
                Activer la météo
              </button>
            
              <div class="weather-content" id="weatherContent" hidden>
                <div class="weather-visual" id="weatherVisual" data-weather="cloud">
                  <span class="weather-sun"></span>
                  <span class="weather-cloud weather-cloud-main"></span>
                  <span class="weather-cloud weather-cloud-small"></span>
                  <span class="weather-rain"></span>
                  <span class="weather-snow"></span>
                  <span class="weather-fog"></span>
                  <span class="weather-lightning"></span>
                </div>
            
                <div class="weather-info">
                  <div class="weather-temp" id="weatherTemp">--°C</div>
                  <div class="weather-condition" id="weatherCondition" data-i18n="weatherGeneric">Météo</div>
            
                  <div class="weather-meta">
                    <span id="weatherFeelsLike">Ressenti --°C</span>
                    <button type="button" class="weather-city-mask" id="weatherCityToggle" title="Afficher / masquer la ville" data-i18n-title="showCity">
                      <span id="weatherCityText"></span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      
        <div class="quick-links">
          <button type="button" id="addShortcutBtn" class="quick-link add-shortcut-btn">
            <span class="quick-plus">+</span>
            <span data-i18n="shortcutAddButton">Raccourci</span>
          </button>
        </div>
      </header>
      
      <section class="saved-sessions-section" id="savedSessionsSection" hidden>
        <div class="saved-sessions-header">
          <div>
            <h2 data-i18n="sessions">Sessions</h2>
            <p data-i18n="sessionsSubtitle">Rouvre rapidement un groupe d’onglets.</p>
          </div>

          <div class="saved-sessions-actions">
            <button type="button" id="createSessionActionBtn" class="saved-session-add-btn" data-action="create-saved-session" data-i18n="createSessionButton">
              + Session
            </button>

            <button type="button" id="syncChromeGroupsBtn" class="saved-session-add-btn" data-action="sync-protected-groups" data-i18n="syncChromeGroups" hidden>
              Synchroniser
            </button>
          </div>
        </div>

        <div class="saved-sessions-tabs" role="tablist" aria-label="Sessions">
          <button type="button" id="sessionsViewBtn" class="saved-sessions-tab is-active" data-action="set-sessions-view" data-session-view="sessions" data-i18n="sessions">
            Sessions
          </button>

          <button type="button" id="groupsViewBtn" class="saved-sessions-tab" data-action="set-sessions-view" data-session-view="groups" data-i18n="protectedGroupsTab">
            Groupes protégés
          </button>
        </div>

        <div class="saved-sessions-list" id="savedSessionsList"></div>
      </section>

      <div class="tab-cleanup-banner" id="tabOutDupeBanner" style="display:none">
    <div class="tab-cleanup-left">
      <div class="tab-cleanup-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75" />
        </svg>
      </div>
      <div class="tab-cleanup-text">
        <span data-i18n="tabOutDupePrefix">You have</span> <strong id="tabOutDupeCount"></strong> <span data-i18n="tabOutDupeSuffix">Tab Out tabs open. Keep just this one?</span>
      </div>
    </div>
    <button class="tab-cleanup-btn" data-action="close-tabout-dupes" data-i18n="closeExtras">Close extras</button>
  </div>

  <!-- ================================================================
       MAIN CONTENT AREA — two-column layout
       Left: open tabs (domain/mission cards)
       Right: saved for later checklist
       The right column only renders when it has items (JS controls this)
       ================================================================ -->
  <div class="dashboard-columns" id="dashboardColumns">

    <!-- LEFT COLUMN: Open tabs -->
    <div class="active-section" id="openTabsSection" style="display:none">
      <div class="section-header">
        <h2 id="openTabsSectionTitle" data-i18n="openTabs">Onglets ouverts</h2>
        <div class="section-line"></div>
        <div class="section-count" id="openTabsSectionCount"></div>
      </div>
      <div class="missions" id="openTabsMissions"></div>
    </div>

    <!-- RIGHT COLUMN: Saved for Later checklist -->
    <div class="deferred-column" id="deferredColumn" style="display:none">
      <div class="section-header">
        <h2 id="deferredTitle" data-i18n="saveForLater">Saved for later</h2>
        <div class="section-line"></div>
        <div class="section-count" id="deferredCount"></div>
      </div>

      <div class="deferred-list" id="deferredList"></div>

      <div class="deferred-empty" id="deferredEmpty" style="display:none">
        <span data-i18n="nothingSaved">Nothing saved. Living in the moment.</span>
      </div>

      <div class="deferred-archive" id="deferredArchive" style="display:none">
        <button class="archive-toggle" id="archiveToggle">
          <svg class="archive-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" /></svg>
          <span data-i18n="archive">Archive</span>
          <span class="archive-count" id="archiveCount"></span>
        </button>
        <div class="archive-body" id="archiveBody" style="display:none">
          <input type="text" class="archive-search" id="archiveSearch" placeholder="Search archived tabs..." data-i18n-placeholder="archiveSearchPlaceholder">
          <div class="archive-list" id="archiveList"></div>
        </div>
      </div>
    </div>

  </div><!-- end .dashboard-columns -->

  <footer>
    <div class="footer-stats">
      <div class="stat">
        <div class="stat-num" id="statTabs">—</div>
        <div class="stat-label" data-i18n="openTabs">Onglets ouverts</div>
      </div>
    </div>
    <div class="last-refresh">
      <!-- Footer credit removed -->
    </div>

   
    
  </footer>

</div><!-- end .container -->

<div id="shortcutModal" class="shortcut-modal" hidden>
  <div class="shortcut-modal-card">
    <h2 data-i18n="addShortcutTitle">Ajouter un raccourci</h2>

    <label>
      <span data-i18n="nameLabel">Nom</span>
      <input type="text" id="shortcutNameInput" placeholder="Ex : Netflix" data-i18n-placeholder="shortcutNamePlaceholder">
    </label>

    <label>
      <span data-i18n="urlLabel">URL</span>
      <input type="url" id="shortcutUrlInput" placeholder="https://example.com" data-i18n-placeholder="shortcutUrlPlaceholder">
    </label>

    <div class="shortcut-modal-actions">
      <button type="button" id="deleteShortcutBtn" data-i18n="delete" hidden>Supprimer</button>
      <button type="button" id="cancelShortcutBtn" data-i18n="cancel">Annuler</button>
      <button type="button" id="saveShortcutBtn" data-i18n="addShortcut">Ajouter</button>
    </div>
  </div>
</div>

<!-- ================================================================
     TOAST — floats above everything, used for action confirmations
     Hidden by default via CSS (opacity:0, translateY)
     ================================================================ -->
<div class="toast" id="toast">
  <!-- Checkmark circle icon (Heroicons outline) -->
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  <span id="toastText"></span>
</div>

<!-- Personal config (gitignored) — defines LOCAL_LANDING_PAGE_PATTERNS etc. -->
<!-- If the file doesn't exist, that's fine — app.js uses sensible defaults. -->
<script src="config.local.js" onerror="/* no personal config, that's fine */"></script>

<!-- Main dashboard logic — loads last so the DOM is ready -->
<script src="app.js"></script>
</body>
</html>
